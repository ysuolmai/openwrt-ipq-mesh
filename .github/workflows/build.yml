name: Build IPQ Mesh

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: OpenWrt/ImmortalWrt source repository
        default: https://github.com/VIKINGYFY/immortalwrt.git
        required: true
        type: string
      source_branch:
        description: Source branch
        default: main
        required: true
        type: string
      test_config_only:
        description: Generate .config only
        default: false
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config_name:
          - IPQ60XX-MESH-AC
          - IPQ60XX-MESH-AP
    env:
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_BRANCH: ${{ inputs.source_branch }}
      CONFIG_NAME: ${{ matrix.config_name }}
      TEST_CONFIG_ONLY: ${{ inputs.test_config_only }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged \
            help2man intltool libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pyelftools qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev

      - name: Clone source
        run: |
          git clone --depth=1 --single-branch --branch "$SOURCE_BRANCH" "$SOURCE_REPO" openwrt
          cd openwrt
          echo "SOURCE_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare config
        run: |
          cd openwrt
          OPENWRT_DIR="$PWD" "$GITHUB_WORKSPACE/scripts/prepare-openwrt.sh" "$CONFIG_NAME"
          make defconfig
          "$GITHUB_WORKSPACE/scripts/check-openwrt-config.sh" "$CONFIG_NAME" .config

      - name: Build firmware
        if: env.TEST_CONFIG_ONLY != 'true'
        run: |
          cd openwrt
          make download -j"$(nproc)"
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect artifacts
        run: |
          cd openwrt
          mkdir -p upload
          cp .config "upload/config-${CONFIG_NAME}-${SOURCE_HASH}.txt"
          if [ "$TEST_CONFIG_ONLY" != "true" ]; then
            find bin/targets \
              -type d -name packages -prune -o \
              -type f -exec cp -f {} upload/ \;
          fi

      - name: Release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CONFIG_NAME }}-${{ env.SOURCE_HASH }}-${{ github.run_number }}
          files: openwrt/upload/*
          body: |
            Source: ${{ env.SOURCE_REPO }}
            Branch: ${{ env.SOURCE_BRANCH }}
            Commit: ${{ env.SOURCE_HASH }}
            Config: ${{ env.CONFIG_NAME }}
            Test config only: ${{ env.TEST_CONFIG_ONLY }}
